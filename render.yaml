services:
  - type: web
    name: threads-post-generator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: XAI_API_KEY
        sync: false
      - key: WAVESPEED_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4.5
      - key: PYTHON_VERSION
        value: "3.10.12"
